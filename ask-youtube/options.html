<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>YouTube Ask Modal Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      max-width: 400px;
      background-color: #f9f9f9;
      color: #333;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      font-weight: normal;
    }
    .checkbox-label input {
      margin-right: 8px;
    }
    button {
      background-color: #065fd4;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #0056b3;
    }
    #status {
      margin-top: 10px;
      color: #0f9d58;
      font-size: 14px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h1>設定 (Settings)</h1>
  
  <div class="form-group">
    <label for="predefinedString">Predefined String (自動入力するテキスト)</label>
    <input type="text" id="predefinedString" placeholder="例: 動画を要約する">
  </div>
  
  <div class="form-group">
    <label class="checkbox-label">
      <input type="checkbox" id="autoSubmit">
      Auto-submit (パネルを開いたときに自動送信する)
    </label>
    <div style="font-size: 12px; color: #666; margin-top: 4px; margin-left: 24px;">
      ※ Predefined Stringが空の場合は自動送信されません。
    </div>
  </div>
  
  <button id="save">Save (保存)</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
